<!DOCTYPE html> 
<html lang="ru"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"> 
    <title>Mercury Energy</title> 
    <script src="https://cdn.tailwindcss.com"></script> 
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mercury : {
                            navy: '#c5a059',
                            lightNavy: '#dcd3c1',
                            silver: '#AAABB8',
                            cyan: '#c5a059',
                            steel: '#8a6d3b',
                            bg: '#1a0f0a',
                            dark: '#1a0f0a',
                            gold: '#c5a059',
                            cream: '#dcd3c1'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script> 
    <style> 
        * { font-family: 'Inter', sans-serif; } 
        body { 
            background: rgb(26, 15, 10); 
            min-height: 100vh; 
            color: #dcd3c1;
        } 
        .glass-card { 
            background: rgba(80, 39, 20, 0.5); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            border-radius: 2rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1); 
        } 
        .glass-panel { 
            background: rgba(78, 39, 27, 0.5); 
            backdrop-filter: blur(14px); 
            border: 1px solid rgba(197, 160, 89, 0.1); 
            border-radius: 1.5rem; 
        } 
        .bento-card { 
            transition: all 0.2s ease-out; 
        } 
        .bento-card:hover { 
            transform: translateY(-4px); 
            background: rgba(40, 30, 20, 0.9); 
            border-color: rgba(197, 160, 89, 0.4); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        } 
        .nav-btn, .primary-btn { 
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); 
        } 
        .nav-btn:active, .primary-btn:active { 
            transform: scale(0.96); 
        } 
        .page { 
            animation: fadeSlideUp 0.35s ease-out; 
        } 
        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(12px);} 
            to { opacity: 1; transform: translateY(0);} 
        } 
        .news-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.5rem;
            padding: 0.5rem 0 1.5rem 0;
            scrollbar-width: none;
        }
        .news-slider::-webkit-scrollbar {
            display: none;
        }
        .news-slide {
            flex: 0 0 85%;
            scroll-snap-align: start;
        }
        @media (min-width: 1024px) {
            .news-slide {
                flex: 0 0 calc((100% - 3rem) / 3);
            }
        }
        @media (min-width: 768px) and (max-width: 1023px) {
            .news-slide {
                flex: 0 0 46%;
            }
        }
        .tank { 
            transition: all 0.3s ease; 
            cursor: pointer; 
        } 
        .tank:hover { 
            transform: translateY(-5px); 
        } 
        .fuel-fill { 
            transition: height 0.5s ease-out; 
        } 
        input {
            color: #dcd3c1;
            background: rgba(0,0,0,0.2);
        }
        input:focus { 
            outline: none; 
            border-color: #c5a059; 
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.2); 
        } 
        .gradient-text { 
            background: linear-gradient(135deg, #c5a059 0%, #8a6d3b 100%); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
        } 
        .home-btn { 
            background: rgba(197, 160, 89, 0.1); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            color: #c5a059;
        } 
        .home-btn:hover { 
            background: rgba(197, 160, 89, 0.2); 
            border-color: rgba(197, 160, 89, 0.3); 
        } 
        .small-nav-btn { 
            background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(197, 160, 89, 0.1); 
            color: #dcd3c1;
            transition: all 0.2s; 
        } 
        .small-nav-btn:hover { 
            background: rgba(197, 160, 89, 0.1); 
            border-color: rgba(197, 160, 89, 0.3); 
            color: #c5a059;
            transform: translateY(-2px); 
        } 
        .hero-bg { 
            color: #2E9CCA;
            background-size: cover; 
            background-position: center; 
        } 
        .chart-container canvas { 
            max-height: 250px; 
            width: 100%; 
        } 
        .logo-container {
            width: 40px;
            height: 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-img {
            max-width: none;
            height: 100%;
            margin-right: 150%; 
            transform: scale(1.5);
        }
    </style> 
</head> 
<body class="antialiased"> 
<div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 relative"> 
    <header class="flex justify-between items-center mb-6 z-30 relative flex-wrap gap-3"> 
        <div class="flex items-center gap-3"> 
            <div class="logo-container rounded-lg">
                <img src="logo.png" class="logo-img" alt="Logo">
            </div>
            <div class="text-2xl font-bold tracking-tight"> 
                <span class="gradient-text">SmartME</span> 
            </div> 
        </div> 
        <div id="headerNav" class="flex items-center gap-2 flex-wrap"> 
        </div> 
    </header> 

    <main id="pageContent" class="page"></main> 
</div> 

<!-- Global Modal -->
<div id="modalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-lg overflow-hidden animate-[fadeSlideUp_0.3s_ease-out]">
        <div class="flex justify-between items-center p-6 border-b border-mercury-gold/10">
            <h3 id="modalTitle" class="text-xl font-bold text-mercury-gold"></h3>
            <button id="closeModalBtn" class="text-mercury-cream hover:text-mercury-gold transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="modalBody" class="p-6 max-h-[70vh] overflow-y-auto"></div>
    </div>
</div>
<script> 
    window.heroVideoPlayed = false;
    function combinations(n, k) { if (k < 0 || k > n) return 0; if (k === 0 || k === n) return 1; if (k > n / 2) k = n - k; let res = 1; for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i; return Math.round(res); }
    function bernoulliProbability(n, k, p) { return combinations(n, k) * Math.pow(p, k) * Math.pow(1 - p, n - k); }

    const fuelPrices = {
        diesel: [
            { location: "Атырау (нефтебаза)", price: "285 ₸/л" },
            { location: "Актобе (нефтебаза)", price: "290 ₸/л" },
            { location: "Шымкент (нефтебаза)", price: "303 ₸/л" }
        ],
        aviationAndPetrol: [
            { name: "Авиатопливо (Jet A-1)", price: "по запросу" },
            { name: "Бензин АИ-92", price: "225 ₸/л" },
            { name: "Бензин АИ-95", price: "235 ₸/л" }
        ],
        updatedAt: "18 мая 2026 года"
    };

    // --- State Initialization ---
    const defaultNews = [ 
        { id: 1, title: "Модернизация нефтебазы JIG", content: "Поэтапная модернизация в соответствии с международными стандартами JIG 2 (issue 13, 2021).", date: "2025-04-20", trending: 92, img: "https://mercuryenergy.kz/upload/iblock/d7a/news.jpg" }, 
        { id: 2, title: "Практика студентов КазНУ", content: "Студенты 4-го курса КазНУ им. Аль-Фараби успешно прошли практику на нефтебазе.", date: "2026-04-30", trending: 88, img: "https://mercuryenergy.kz/upload/iblock/d7a/KZNU.jpeg" }, 
        { id: 3, title: "Меморандум с SCAT Airlines", content: "Соглашение о развитии инфраструктуры хранения авиатоплива и расширении сети поставок.", date: "2024-04-30", trending: 75, img: "https://mercuryenergy.kz/scat.jpeg" }, 
        { id: 4, title: "Запуск Smart АЗС ION Energy", content: "Инновационный проект 'умных' АЗС на модульной основе с цифровыми решениями.", date: "2025-03-15", trending: 94, img: "https://mercuryenergy.kz/upload/iblock/4b9/AZSION2.png" } 
    ];

    const defaultTanks = [
        { id: 1, name: "Резервуар №1 (АИ-92)", value: 42500, max: 50000, color: "from-mercury-cyan to-mercury-steel" },
        { id: 2, name: "Резервуар №2 (АИ-95)", value: 31200, max: 50000, color: "from-mercury-steel to-mercury-lightNavy" },
        { id: 3, name: "Резервуар №3 (ДТ)", value: 48700, max: 60000, color: "from-emerald-500 to-emerald-400" },
        { id: 4, name: "Резервуар №4 (АИ-98)", value: 18600, max: 40000, color: "from-purple-500 to-purple-400" }
    ];

    const defaultUsers = [
        { username: "admin", password: "admin", role: "admin" }
    ];

    if (!localStorage.getItem('mercuryNews')) localStorage.setItem('mercuryNews', JSON.stringify(defaultNews));
    if (!localStorage.getItem('mercuryTanks')) localStorage.setItem('mercuryTanks', JSON.stringify(defaultTanks));
    if (!localStorage.getItem('mercuryUsers')) localStorage.setItem('mercuryUsers', JSON.stringify(defaultUsers));

    let newsArchive = JSON.parse(localStorage.getItem('mercuryNews'));
    let tanksData = JSON.parse(localStorage.getItem('mercuryTanks'));
    let users = JSON.parse(localStorage.getItem('mercuryUsers'));
    let currentUser = JSON.parse(localStorage.getItem('mercuryUser')) || null;

    function renderHeader() {
        const nav = document.getElementById('headerNav');
        if (!nav) return;

        let adminButtons = '';
        if (currentUser && currentUser.role === 'admin') {
            adminButtons = `
                <button id="usersListBtn" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all"> 
                    <i class="fas fa-users text-xs"></i> 
                    <span>Список</span> 
                </button> 
            `;
        }

        let authButton = '';
        if (currentUser) {
            authButton = `
                <div class="flex flex-col items-center gap-1">
                    <button id="logoutBtn" class="bg-red-500/20 text-red-400 flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border border-red-500/30 transition-all hover:bg-red-500/30"> 
                        <i class="fas fa-sign-out-alt text-xs"></i> 
                        <span>Выход</span> 
                    </button>
                    ${currentUser.role === 'admin' ? `
                    <button id="addUserBtn" class="text-[9px] text-mercury-cyan hover:underline">
                        + Добавить нового User
                    </button>
                    ` : ''}
                </div>
            `;
        } else {
            authButton = `
                <button data-nav="login" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn"> 
                    <i class="fas fa-user text-xs"></i> 
                    <span>Вход</span> 
                </button> 
            `;
        }

        nav.innerHTML = `
            <button id="homeButton" class="home-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-btn"> 
                <i class="fas fa-home text-xs"></i> 
                <span>Главная</span> 
            </button> 
            <button data-nav="about" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn"> 
                <i class="fas fa-building text-xs"></i> 
                <span class="hidden sm:inline">О компании</span> 
            </button> 
            ${currentUser ? `
            <button data-nav="tanks" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn"> 
                <i class="fas fa-oil-can text-xs"></i> 
                <span class="hidden sm:inline">АЗС / Нефтебаза</span> 
            </button> ` : ''}
            <button data-nav="contacts" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn"> 
                <i class="fas fa-phone text-xs"></i> 
                <span class="hidden sm:inline">Контакты</span> 
            </button> 
            ${adminButtons}
            <a href="https://mercuryenergy.kz" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 bg-mercury-gold/10 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border border-mercury-gold/30 hover:bg-mercury-gold/20 transition-all nav-btn text-mercury-cyan"> 
                <i class="fas fa-external-link-alt text-xs"></i> 
                <span class="hidden sm:inline">Сайт</span> 
            </a> 
            ${authButton}
        `;

        document.getElementById('homeButton')?.addEventListener('click', () => renderPage('home'));
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            currentUser = null;
            localStorage.removeItem('mercuryUser');
            renderHeader();
            renderPage('home');
        });
        document.getElementById('usersListBtn')?.addEventListener('click', () => openUsersListModal());
        document.getElementById('addUserBtn')?.addEventListener('click', () => openAddUserModal());
    }

    function showModal(title, bodyHtml) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.getElementById('modalOverlay').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.add('hidden');
        document.getElementById('modalBody').innerHTML = '';
    }

    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('modalOverlay')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    function openUsersListModal() {
        let rows = users.map(u => `
            <div class="flex justify-between py-2 border-b border-mercury-gold/10 text-sm">
                <span class="text-mercury-gold font-bold">${u.username}</span>
                <span class="text-mercury-cream">${u.password}</span>
            </div>
        `).join('');
        showModal('Список аккаунтов', `<div class="space-y-1">${rows}</div>`);
    }

    function openAddNewsModal() {
        showModal('Добавить новость', `
            <form id="addNewsForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-mercury-cream mb-1">Краткое название</label>
                    <input type="text" id="newsTitle" class="w-full bg-black/20 border border-mercury-gold/20 rounded-xl px-4 py-2" required>
                </div>
                <div>
                    <label class="block text-xs text-mercury-cream mb-1">Полная новость</label>
                    <textarea id="newsContent" rows="4" class="w-full bg-black/20 border border-mercury-gold/20 rounded-xl px-4 py-2 text-mercury-cream" required></textarea>
                </div>
                <div>
                    <label class="block text-xs text-mercury-cream mb-1">Прикрепить фото</label>
                    <input type="file" id="newsPhoto" accept="image/*" class="w-full text-xs text-mercury-cream">
                </div>
                <button type="submit" class="w-full bg-mercury-gold text-black font-bold py-2 rounded-xl mt-4">Опубликовать</button>
            </form>
        `);
        document.getElementById('addNewsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('newsTitle').value;
            const content = document.getElementById('newsContent').value;
            const photoInput = document.getElementById('newsPhoto');
            
            const processNews = (imgSrc) => {
                const newNews = {
                    id: Date.now(),
                    title,
                    content,
                    date: new Date().toISOString().split('T')[0],
                    trending: Math.floor(Math.random() * 20) + 80,
                    img: imgSrc || "https://mercuryenergy.kz/upload/iblock/d7a/news.jpg"
                };
                newsArchive.unshift(newNews);
                localStorage.setItem('mercuryNews', JSON.stringify(newsArchive));
                closeModal();
                renderPage('news');
            };

            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => processNews(event.target.result);
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                processNews();
            }
        });
    }

    function openAddUserModal() {
        showModal('Добавить нового пользователя', `
            <form id="addUserForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-mercury-cream mb-1">Логин</label>
                    <input type="text" id="newUsername" class="w-full bg-black/20 border border-mercury-gold/20 rounded-xl px-4 py-2" required>
                </div>
                <div>
                    <label class="block text-xs text-mercury-cream mb-1">Пароль</label>
                    <input type="text" id="newPassword" class="w-full bg-black/20 border border-mercury-gold/20 rounded-xl px-4 py-2" required>
                </div>
                <button type="submit" class="w-full bg-mercury-gold text-black font-bold py-2 rounded-xl mt-4">Создать</button>
            </form>
        `);
        document.getElementById('addUserForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            users.push({ username, password, role: 'user' });
            localStorage.setItem('mercuryUsers', JSON.stringify(users));
            closeModal();
            alert('Пользователь создан!');
        });
    }

    function saveTanks() {
        const inputs = document.querySelectorAll('input[data-tank-id]');
        inputs.forEach(input => {
            const id = parseInt(input.getAttribute('data-tank-id'));
            const val = parseInt(input.value);
            const tank = tanksData.find(t => t.id === id);
            if (tank) {
                tank.value = val;
            }
        });
        localStorage.setItem('mercuryTanks', JSON.stringify(tanksData));
        renderPage('tanks');
        alert('Данные успешно сохранены!');
    }

    function login(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem('mercuryUser', JSON.stringify(user));
            renderHeader();
            renderPage('home');
            return true;
        }
        return false;
    }

    let newsSortMode = 'newest'; 
    function formatDate(dateStr) { const d = new Date(dateStr); return `${d.getDate()} ${['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()]} ${d.getFullYear()}`; } 
    function getSortedNews() { 
        let arr = [...newsArchive]; 
        if (newsSortMode === 'newest') arr.sort((a,b) => new Date(b.date) - new Date(a.date)); 
        else if (newsSortMode === 'oldest') arr.sort((a,b) => new Date(a.date) - new Date(b.date)); 
        else arr.sort((a,b) => b.trending - a.trending); 
        return arr; 
    } 

    function renderHome() { 
        const heroContent = window.heroVideoPlayed 
            ? `<div class="relative z-10 text-center px-4">
                 <h1 class="text-4xl md:text-6xl font-extrabold text-mercury-gold tracking-tighter leading-none opacity-100">Smart Mercury Energy</h1>
               </div>`
            : `<video id="heroVideo" class="absolute inset-0 w-full h-full object-cover" autoplay muted playsinline>
                 <source src="video2.mp4" type="video/mp4">
               </video>
               <div id="videoOverlay" class="absolute inset-0 bg-black/40"></div>
               <div class="relative z-10 text-center px-4">
                 <h1 id="heroText" class="text-4xl md:text-6xl font-extrabold text-mercury-gold tracking-tighter leading-none opacity-0 transition-opacity duration-1000">Smart Mercury Energy</h1>
               </div>`;

        return ` 
            <div class="space-y-6"> 
                <div class="relative rounded-3xl overflow-hidden h-60 bg-black flex items-center justify-center"> 
                    ${heroContent}
                </div> 

                <div class="glass-panel p-6 rounded-2xl">
                    <div class="text-center mb-4">
                        <h2 class="text-xl font-bold flex items-center justify-center gap-2 text-mercury-cyan">
                            <i class="fas fa-tags"></i> Топливные цены
                        </h2>
                        <p class="text-xs text-mercury-cream/60">Актуально на ${fuelPrices.updatedAt}</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <h3 class="text-sm font-bold text-mercury-gold flex items-center gap-2 border-b border-mercury-gold/20 pb-1">
                                <i class="fas fa-oil-can"></i> Дизельное топливо
                            </h3>
                            ${fuelPrices.diesel.map(item => `
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-mercury-cream">${item.location}</span>
                                    <span class="font-bold text-mercury-gold">${item.price}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="space-y-3">
                            <h3 class="text-sm font-bold text-mercury-gold flex items-center gap-2 border-b border-mercury-gold/20 pb-1">
                                <i class="fas fa-gas-pump"></i> Авиатопливо и бензин
                            </h3>
                            ${fuelPrices.aviationAndPetrol.map(item => `
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-mercury-cream">${item.name}</span>
                                    <span class="font-bold text-mercury-gold">${item.price}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                 
                <div class="glass-panel p-6 rounded-2xl overflow-hidden"> 
                    <div class="flex justify-between items-center mb-6 flex-wrap gap-2"> 
                        <h2 class="text-xl font-semibold text-mercury-gold"><i class="fas fa-newspaper text-mercury-cyan mr-2"></i>Свежие новости</h2> 
                        <div class="flex gap-2">

                <div class="grid md:grid-cols-2 gap-10">

    function initHeroVideo() {
        const video = document.getElementById('heroVideo');
        const heroText = document.getElementById('heroText');
        if (!video || !heroText) return;

        video.addEventListener('timeupdate', () => {
            if (video.currentTime > video.duration - 2) {
                heroText.classList.remove('opacity-0');
                heroText.classList.add('opacity-100');
            }
        });

        video.addEventListener('ended', () => {
            window.heroVideoPlayed = true;
            video.style.display = 'none';
            const overlay = document.getElementById('videoOverlay');
            if (overlay) overlay.style.display = 'none';
            heroText.classList.remove('opacity-0');
            heroText.classList.add('opacity-100');
        });
    }

    let bernoulliChart = null; 
    function initBernoulliChart() { 
        const ctx = document.getElementById('bernoulliChart')?.getContext('2d'); if (!ctx) return; 
        const n = parseInt(document.getElementById('bernoulliN').value) || 0; const p = parseFloat(document.getElementById('bernoulliP').value) || 0;
        const k_vals = Array.from({length: n + 1}, (_, i) => i); const probs = k_vals.map(k => bernoulliProbability(n, k, p));
        if (bernoulliChart) bernoulliChart.destroy(); 
        bernoulliChart = new Chart(ctx, { 
            type: 'bar', 
            data: { 
                labels: k_vals, 
                datasets: [{ 
                    label: `P(X=k)`, 
                    data: probs, 
                    backgroundColor: 'rgba(197, 160, 89, 0.6)',
                    borderColor: 'rgba(197, 160, 89, 1)',
                    borderWidth: 1
                }] 
            }, 
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(197, 160, 89, 0.05)' },
                        ticks: { color: '#dcd3c1' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#dcd3c1' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#c5a059' } }
                }
            } 
        }); 
    } 

    function renderPage(pageId) { 
        const content = document.getElementById('pageContent');

        if (pageId === 'tanks' && !currentUser) {
            renderPage('login');
            return;
        }

        if (pageId === 'home') {
            content.innerHTML = renderHome(); 
            initHeroVideo();
        }
        else if (pageId === 'tanks') { 
            content.innerHTML = renderTanksPage(); 
            initBernoulliChart(); 
            document.getElementById('bernoulliN')?.addEventListener('input', initBernoulliChart); 
            document.getElementById('bernoulliP')?.addEventListener('input', initBernoulliChart); 
            if (currentUser && currentUser.role === 'admin') {
                document.getElementById('saveTanksBtn')?.addEventListener('click', saveTanks);
            }
        } 
        else if (pageId === 'about') content.innerHTML = renderAboutPage(); 
        else if (pageId === 'news') {
            content.innerHTML = renderNewsPage(); 
            document.getElementById('addNewsBtn')?.addEventListener('click', openAddNewsModal);
        }
        else if (pageId === 'prices') content.innerHTML = renderPricesPage(); 
        else if (pageId === 'contacts') content.innerHTML = renderContactsPage(); 
        else if (pageId === 'login') {
            content.innerHTML = renderLoginPage();
            document.getElementById('loginForm')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                if (!login(u, p)) {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            });
        }
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    } 

    document.addEventListener('click', (e) => {
        const navBtn = e.target.closest('[data-nav], .nav-page-btn');
        if (navBtn) {
            e.preventDefault();
            const target = navBtn.getAttribute('data-nav');
            if (target) renderPage(target);
        }

        const sortBtn = e.target.closest('[data-news-sort]'); 
        if (sortBtn) { 
            newsSortMode = sortBtn.getAttribute('data-news-sort'); 
            renderPage('news'); 
        }
    });

    renderHeader();
    renderPage('home'); 
</script>
