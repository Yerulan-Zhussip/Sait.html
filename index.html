<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mercury Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mercury : {
                            navy: '#c5a059',
                            lightNavy: '#dcd3c1',
                            silver: '#AAABB8',
                            cyan: '#c5a059',
                            steel: '#8a6d3b',
                            bg: '#1a0f0a',
                            dark: '#1a0f0a',
                            gold: '#c5a059',
                            cream: '#dcd3c1'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: rgb(26, 15, 10);
            min-height: 100vh;
            color: #dcd3c1;
        }
        .glass-card {
            background: rgba(80, 39, 20, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }
        .glass-panel {
            background: rgba(78, 39, 27, 0.5);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(197, 160, 89, 0.1);
            border-radius: 1.5rem;
        }
        .bento-card {
            transition: all 0.2s ease-out;
        }
        .bento-card:hover {
            transform: translateY(-4px);
            background: rgba(40, 30, 20, 0.9);
            border-color: rgba(197, 160, 89, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .nav-btn, .primary-btn {
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .nav-btn:active, .primary-btn:active {
            transform: scale(0.96);
        }
        .page {
            animation: fadeSlideUp 0.35s ease-out;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .news-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.5rem;
            padding: 0.5rem 0 1.5rem 0;
            scrollbar-width: none;
        }
        .news-slider::-webkit-scrollbar {
            display: none;
        }
        .news-slide {
            flex: 0 0 85%;
            scroll-snap-align: start;
        }
        @media (min-width: 1024px) {
            .news-slide {
                flex: 0 0 calc((100% - 3rem) / 3);
            }
        }
        @media (min-width: 768px) and (max-width: 1023px) {
            .news-slide {
                flex: 0 0 46%;
            }
        }
        .tank {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .tank:hover {
            transform: translateY(-5px);
        }
        .fuel-fill {
            transition: height 0.5s ease-out;
        }
        input {
            color: #dcd3c1;
            background: rgba(0,0,0,0.2);
        }
        input:focus {
            outline: none;
            border-color: #c5a059;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #c5a059 0%, #8a6d3b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .home-btn {
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.2);
            color: #c5a059;
            cursor: pointer;
        }
        .home-btn:hover {
            background: rgba(197, 160, 89, 0.2);
            border-color: rgba(197, 160, 89, 0.3);
        }
        .small-nav-btn, .nav-page-btn {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(197, 160, 89, 0.1);
            color: #dcd3c1;
            transition: all 0.2s;
            cursor: pointer;
        }
        .small-nav-btn:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: rgba(197, 160, 89, 0.3);
            color: #c5a059;
            transform: translateY(-2px);
        }
        .hero-bg {
            color: #2E9CCA;
            background-size: cover;
            background-position: center;
        }
        .chart-container canvas {
            max-height: 250px;
            width: 100%;
        }
        .logo-container {
            width: 40px;
            height: 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-img {
            max-width: none;
            height: 100%;
            margin-right: 150%;
            transform: scale(1.5);
        }
    </style>
</head>
<body class="antialiased">
<div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 relative">
    <header class="flex justify-between items-center mb-6 z-30 relative flex-wrap gap-3">

            <div class="logo-container rounded-lg">
                <img src="logo.png" class="logo-img" alt="Logo">
            </div>
            <div class="text-2xl font-bold tracking-tight">
                <span class="gradient-text">SmartME</span>
            </div>
        </div>
        <div id="headerNav" class="flex items-center gap-2 flex-wrap">
        </div>
    </header>

    <main id="pageContent" class="page"></main>
</div>

<!-- Global Modal -->
<div id="modalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-lg overflow-hidden animate-[fadeSlideUp_0.3s_ease-out]">
        <div class="flex justify-between items-center p-6 border-b border-mercury-gold/10">
            <h3 id="modalTitle" class="text-xl font-bold text-mercury-gold"></h3>
            <button id="closeModalBtn" class="text-mercury-cream hover:text-mercury-gold transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="modalBody" class="p-6 max-h-[70vh] overflow-y-auto"></div>
    </div>
</div>
<script>
    function combinations(n, k) { if (k < 0 || k > n) return 0; if (k === 0 || k === n) return 1; if (k > n / 2) k = n - k; let res = 1; for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i; return Math.round(res); }
    function bernoulliProbability(n, k, p) { return combinations(n, k) * Math.pow(p, k) * Math.pow(1 - p, n - k); }

    const defaultPrices = {
        diesel: [
            { location: "Атырау (нефтебаза)", price: "285 ₸/л" },
            { location: "Актобе (нефтебаза)", price: "290 ₸/л" },
            { location: "Шымкент (нефтебаза)", price: "303 ₸/л" }
        ],
        aviationAndPetrol: [
            { name: "Авиатопливо (Jet A-1)", price: "по запросу" },
            { name: "Бензин АИ-92", price: "225 ₸/л" },
            { name: "Бензин АИ-95", price: "235 ₸/л" }
        ],
        updatedAt: "18 мая 2026 года"
    };

    const defaultMarketPrices = {
        fuels: ["Бензин", "Керосин", "Дизель", "Jet A-1"],
        sources: ["Сингапур", "Аргус", "Оптовая", "Розница"],
        prices: {
            "Бензин": { "Сингапур": "0", "Аргус": "0", "Оптовая": "0", "Розница": "0" },
            "Керосин": { "Сингапур": "0", "Аргус": "0", "Оптовая": "0", "Розница": "0" },
            "Дизель": { "Сингапур": "0", "Аргус": "0", "Оптовая": "0", "Розница": "0" },
            "Jet A-1": { "Сингапур": "0", "Аргус": "0", "Оптовая": "0", "Розница": "0" }
        }
    };

    const defaultNews = [
        { id: 1, title: "Модернизация нефтебазы JIG", content: "Поэтапная модернизация в соответствии с международными стандартами JIG 2 (issue 13, 2021).", date: "2025-04-20", trending: 92, img: "https://mercuryenergy.kz/upload/iblock/d7a/news.jpg" },
        { id: 2, title: "Практика студентов КазНУ", content: "Студенты 4-го курса КазНУ им. Аль-Фараби успешно прошли практику на нефтебазе.", date: "2026-04-30", trending: 88, img: "https://mercuryenergy.kz/upload/iblock/d7a/KZNU.jpeg" },
        { id: 3, title: "Меморандум с SCAT Airlines", content: "Соглашение о развитии инфраструктуры хранения авиатоплива и расширении сети поставок.", date: "2024-04-30", trending: 75, img: "https://mercuryenergy.kz/scat.jpeg" },
        { id: 4, title: "Запуск Smart АЗС ION Energy", content: "Инновационный проект 'умных' АЗС на модульной основе с цифровыми решениями.", date: "2025-03-15", trending: 94, img: "https://mercuryenergy.kz/upload/iblock/4b9/AZSION2.png" }
    ];

    function generateDefaultTanks() {
        const cities = [
            { name: "Astana", count: 5 },
            { name: "Almaty", count: 13 },
            { name: "Dostyk", count: 5 }
        ];
        const tanks = [];
        let id = 1;
        cities.forEach(city => {
            for (let i = 1; i <= city.count; i++) {
                tanks.push({
                    id: id++,
                    name: `Резервуар №${i}`,
                    city: city.name,
                    content: "Дизельное топливо",
                    value: Math.floor(Math.random() * 75000),
                    max: 75000,
                    color: city.name === "Astana" ? "from-mercury-cyan to-mercury-steel" :
                           city.name === "Almaty" ? "from-emerald-500 to-emerald-400" :
                           "from-purple-500 to-purple-400"
                });
            }
        });
        return tanks;
    }
    const defaultTanks = generateDefaultTanks();

    const defaultUsers = [
        {
            username: "admin",
            password: "admin",
            role: "admin",
            firstName: "Админ",
            lastName: "Главный",
            position: "Администратор",
            birthDate: "1985-01-01",
            cabinet: "101",
            photo: null,
            permissions: {
                viewTanks: "all",
                canEditPrices: true,
                canEditTanks: true,
                canAddNews: true,
                canViewMarketPrices: true,
                canEditMarketPrices: true
            },
            lastSeen: Date.now()
        }
    ];

    if (!localStorage.getItem("mercuryPrices")) localStorage.setItem("mercuryPrices", JSON.stringify(defaultPrices));
    if (!localStorage.getItem("mercuryMarketPrices")) localStorage.setItem("mercuryMarketPrices", JSON.stringify(defaultMarketPrices));
    if (!localStorage.getItem("mercuryNews")) localStorage.setItem("mercuryNews", JSON.stringify(defaultNews));
    let storedTanks = localStorage.getItem("mercuryTanks");
    if (storedTanks) {
        try {
            let parsed = JSON.parse(storedTanks);
            if (parsed.length > 0 && !parsed[0].city) {
                localStorage.setItem("mercuryTanks", JSON.stringify(defaultTanks));
            }
        } catch(e) {
            localStorage.setItem("mercuryTanks", JSON.stringify(defaultTanks));
        }
    } else {
        localStorage.setItem("mercuryTanks", JSON.stringify(defaultTanks));
    }
    if (!localStorage.getItem("mercuryUsers")) localStorage.setItem("mercuryUsers", JSON.stringify(defaultUsers));
    if (!localStorage.getItem("mercuryLogs")) localStorage.setItem("mercuryLogs", JSON.stringify([]));

    let fuelPrices = JSON.parse(localStorage.getItem("mercuryPrices"));
    let marketPrices = JSON.parse(localStorage.getItem("mercuryMarketPrices"));
    let newsArchive = JSON.parse(localStorage.getItem("mercuryNews"));
    let tanksData = JSON.parse(localStorage.getItem("mercuryTanks"));
    let selectedTankCity = null;
    let users = JSON.parse(localStorage.getItem("mercuryUsers"));
    let currentUser = JSON.parse(localStorage.getItem("mercuryUser")) || null;
    let mercuryLogs = [];
    try {
        mercuryLogs = JSON.parse(localStorage.getItem("mercuryLogs")) || [];
        if (!Array.isArray(mercuryLogs)) mercuryLogs = [];
    } catch (e) {
        mercuryLogs = [];
    }

    function updateHeartbeat() {
        if (currentUser) {
            currentUser.lastSeen = Date.now();
            const idx = users.findIndex(u => u.username === currentUser.username);
            if (idx !== -1) {
                users[idx].lastSeen = currentUser.lastSeen;
                localStorage.setItem("mercuryUsers", JSON.stringify(users));
                localStorage.setItem("mercuryUser", JSON.stringify(currentUser));
            }
        }
    }

    if (currentUser) {
        const found = users.find(u => u.username === currentUser.username);
        if (found) {
            currentUser = found;
            updateHeartbeat();
        }
    }
    setInterval(updateHeartbeat, 30000);

    function logChange(action) {
        if (!currentUser) return;
        const displayName = (currentUser.firstName && currentUser.lastName)
            ? `${currentUser.firstName} ${currentUser.lastName}`
            : currentUser.username;
        const entry = {
            user: displayName,
            action: action,
            timestamp: Date.now()
        };
        mercuryLogs.unshift(entry);
        localStorage.setItem("mercuryLogs", JSON.stringify(mercuryLogs));

        const message = `${displayName} ${action}`;
        console.log(`Email notification sent to zhusiperulan@gmail.com: ${message}`);

        fetch("https://formsubmit.co/ajax/zhusiperulan@gmail.com", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: message,
                _subject: "Новое изменение на сайте SmartME"
            })
        }).catch(err => console.error("Email error:", err));
    }

    function renderHeader() {
        const nav = document.getElementById('headerNav');
        if (!nav) return;

        let authButton = '';
        if (currentUser) {
            authButton = `
                <div class="flex flex-col items-center gap-1">
                    <button id="logoutBtn" class="bg-red-500/20 text-red-400 flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border border-red-500/30 transition-all hover:bg-red-500/30">
                        <i class="fas fa-sign-out-alt text-xs"></i>
                        <span>Выход</span>
                    </button>
                    ${currentUser.role === 'admin' ? `
                    <button id="addUserBtn" class="text-[9px] text-mercury-cyan hover:underline">
                        + Добавить нового User
                    </button>
                    ` : ''}
                </div>
            `;
        } else {
            authButton = `
                <button id="navLogin" data-nav="login" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn">
                    <i class="fas fa-user text-xs"></i>
                    <span>Вход</span>
                </button>
            `;
        }

        nav.innerHTML = `
            <button data-nav="home" class="home-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-btn nav-page-btn">
                <i class="fas fa-home text-xs"></i>
                <span>Главная</span>
            </button>
            <button data-nav="about" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn">
                <i class="fas fa-building text-xs"></i>
                <span class="hidden sm:inline">О компании</span>
            </button>
            ${currentUser ? `
            <button data-nav="tanks" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn">
                <i class="fas fa-oil-can text-xs"></i>
                <span class="hidden sm:inline">АЗС / Нефтебаза</span>
            </button>
            ${(currentUser.role === 'admin' || currentUser.permissions.canViewMarketPrices) ? `
            <button data-nav="marketPrices" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn">
                <i class="fas fa-tags text-xs"></i>
                <span class="hidden sm:inline">Цены</span>
            </button>` : ''}
            ` : ''}
            <button data-nav="contacts" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn">
                <i class="fas fa-phone text-xs"></i>
                <span class="hidden sm:inline">Контакты</span>
            </button>
            ${currentUser ? `
            <button data-nav="profile" class="small-nav-btn flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border transition-all nav-page-btn">
                <i class="fas fa-user-circle text-xs"></i>
                <span class="hidden sm:inline">Мой кабинет</span>
            </button> ` : ''}
            <a href="https://mercuryenergy.kz" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 bg-mercury-gold/10 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium border border-mercury-gold/30 hover:bg-mercury-gold/20 transition-all nav-btn text-mercury-cyan">
                <i class="fas fa-external-link-alt text-xs"></i>
                <span class="hidden sm:inline">Сайт</span>
            </a>
            ${authButton}
        `;

        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            currentUser = null;
            localStorage.removeItem('mercuryUser');
            renderHeader();
            renderPage('home');
        });
        document.getElementById('addUserBtn')?.addEventListener('click', () => openAddUserModal());
    }

    function showModal(title, bodyHtml) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.getElementById('modalOverlay').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.add('hidden');
        document.getElementById('modalBody').innerHTML = '';
    }

    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('modalOverlay')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    function openChangesModal() {
        const groupedLogs = mercuryLogs.reduce((acc, log) => {
            const date = new Date(log.timestamp).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit' }).replace(/\./g, '/');
            if (!acc[date]) acc[date] = [];
            acc[date].push(log);
            return acc;
        }, {});

        const sortedDates = Object.keys(groupedLogs).sort((a, b) => {
            const [da, ma, ya] = a.split('/').map(Number);
            const [db, mb, yb] = b.split('/').map(Number);
            return new Date(2000 + yb, mb - 1, db) - new Date(2000 + ya, ma - 1, da);
        });

        let html = '<div class="space-y-6">';
        sortedDates.forEach(date => {
            html += `
                <div>
                    <h4 class="text-mercury-gold font-bold border-b border-mercury-gold/20 pb-1 mb-2">${date}</h4>
                    <div class="space-y-2">
                        ${groupedLogs[date].map(log => `
                            <div class="flex justify-between items-center text-xs text-mercury-cream">
                                <span>${log.user} ${log.action}</span>
                                <span class="text-[10px] text-mercury-cream/40">${new Date(log.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        html += '</div>';

        showModal("Последние изменения", html);
    }

    function openEmployeesModal() {
        let rows = users.map(u => {
            const isOnline = u.lastSeen && (Date.now() - u.lastSeen < 180000);
            const statusText = isOnline ?
                '<span class="text-emerald-400">Онлайн</span>' :
                `<span class="text-mercury-cream/40">Был(а) в сети: ${u.lastSeen ? new Date(u.lastSeen).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'}) : 'Неизвестно'}</span>`;

            return `
            <div class="flex justify-between items-center py-3 border-b border-mercury-gold/10 text-sm hover:bg-white/5 px-2 transition-colors">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full border border-mercury-gold/20 flex items-center justify-center overflow-hidden bg-black/20">
                        ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : `<i class="fas fa-user text-xs text-mercury-gold/40"></i>`}
                    </div>
                    <div>
                        <div class="font-bold text-mercury-gold">${u.firstName} ${u.lastName} <span class="text-[10px] text-mercury-cream/40 font-normal ml-1">@${u.username}</span></div>
                        <div class="text-[10px] text-mercury-cyan">${u.position} • ${statusText}</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-[10px] text-mercury-cream/60 mr-4 font-mono">${u.password}</div>
                    <button onclick="openEditUserModal('${u.username}')" class="text-mercury-cyan hover:text-white transition-colors"><i class="fas fa-edit"></i></button>
                    ${u.role !== "admin" ? `<button onclick="deleteUser('${u.username}')" class="text-red-400 hover:text-red-300 transition-colors"><i class="fas fa-trash"></i></button>` : ""}
                </div>
            </div>
        `;}).join("");
        showModal("Сотрудники", `<div class="space-y-1">${rows}</div>`);
    }

    function deleteUser(username) {
        if (confirm(`Вы уверены, что хотите удалить пользователя ${username}?`)) {
            users = users.filter(u => u.username !== username);
            localStorage.setItem("mercuryUsers", JSON.stringify(users));
            logChange(`удалил(а) аккаунт: ${username}`);
            openEmployeesModal();
        }
    }

    function openEditUserModal(username) {
        const u = users.find(user => user.username === username);
        if (!u) return;

        showModal(`Редактировать: ${username}`, `
            <form id="editUserForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-mercury-cream mb-1 uppercase">Логин</label>
                        <input type="text" id="editUsername" value="${u.username}" class="w-full bg-black/20 border border-mercury-gold/20 rounded-xl px-4 py-2" required>

            e.preventDefault();
            const title = document.getElementById('newsTitle').value;
            const content = document.getElementById('newsContent').value;
            const photoInput = document.getElementById('newsPhoto');

            const processNews = (imgSrc) => {
                const newNews = {
                    id: Date.now(),
                    title,
                    content,
                    date: new Date().toISOString().split('T')[0],
                    trending: Math.floor(Math.random() * 20) + 80,

                };

                logChange(`добавил(а) новость: ${title}`);
                closeModal();
                renderPage('news');
            };

            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => processNews(event.target.result);
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                processNews();
            }
        });

    function saveTanks() {
        const inputs = document.querySelectorAll('input[data-tank-id]');
        inputs.forEach(input => {
            const id = parseInt(input.getAttribute('data-tank-id'));
            const val = parseInt(input.value);
            const tank = tanksData.find(t => t.id === id);
            if (tank) {
                tank.value = val;
            }
        });
        localStorage.setItem('mercuryTanks', JSON.stringify(tanksData));
        logChange("обновил(а) данные резервуаров");
        renderPage('tanks');
        alert('Данные успешно сохранены!');
    }

    let newsSortMode = 'newest';
    function formatDate(dateStr) { const d = new Date(dateStr); return `${d.getDate()} ${['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()]} ${d.getFullYear()}`; }
    function getSortedNews() {
        let arr = [...newsArchive];
        if (newsSortMode === 'newest') arr.sort((a,b) => new Date(b.date) - new Date(a.date));
        else if (newsSortMode === 'oldest') arr.sort((a,b) => new Date(a.date) - new Date(b.date));
        else arr.sort((a,b) => b.trending - a.trending);
        return arr;
    }

    function openAddMarketFuelModal() {
        showModal("Добавить вид топлива", `
            <form id="addMarketFuelForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-mercury-cream mb-1 uppercase">Название топлива (например, АИ-98)</label>
                    <input type="text" id="newMarketFuelName" class="w-full bg-black/20 border border-mercury-gold/20 rounded-xl px-4 py-2" required>
                </div>
                <button type="submit" class="w-full bg-mercury-gold text-black font-bold py-2 rounded-xl mt-4 hover:bg-mercury-steel transition-all">Добавить</button>
            </form>
        `);

        document.getElementById("addMarketFuelForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const fuelName = document.getElementById("newMarketFuelName").value;
            if (marketPrices.fuels.includes(fuelName)) {
                alert("Такое топливо уже есть!");
                return;
            }

            marketPrices.fuels.push(fuelName);
            marketPrices.prices[fuelName] = {};
            marketPrices.sources.forEach(source => {
                marketPrices.prices[fuelName][source] = "0";
            });

            localStorage.setItem("mercuryMarketPrices", JSON.stringify(marketPrices));
            logChange(`добавил(а) новый вид топлива в цены: ${fuelName}`);
            closeModal();
            renderPage("marketPrices");
        });
    }

    function saveMarketPrices() {
        const inputs = document.querySelectorAll('input[data-fuel][data-source]');
        inputs.forEach(input => {
            const fuel = input.getAttribute('data-fuel');
            const source = input.getAttribute('data-source');
            marketPrices.prices[fuel][source] = input.value;
        });

        localStorage.setItem("mercuryMarketPrices", JSON.stringify(marketPrices));
        logChange("обновил(а) рыночные цены");
        renderPage("marketPrices");
        alert("Цены успешно сохранены!");
    }

    function initProfileHandlers() {
        document.getElementById('profilePhotoInput')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentUser.photo = event.target.result;
                    const userIdx = users.findIndex(u => u.username === currentUser.username);
                    if (userIdx !== -1) {
                        users[userIdx].photo = event.target.result;
                        localStorage.setItem('mercuryUsers', JSON.stringify(users));
                        localStorage.setItem('mercuryUser', JSON.stringify(currentUser));
                        renderPage('profile');
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('changePasswordForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const newPass = document.getElementById('newProfilePassword').value;
            const confirmPass = document.getElementById('confirmProfilePassword').value;

            if (newPass !== confirmPass) {
                alert('Пароли не совпадают!');
                return;
            }

            const userIdx = users.findIndex(u => u.username === currentUser.username);
            if (userIdx !== -1) {
                users[userIdx].password = newPass;
                currentUser.password = newPass;
                localStorage.setItem('mercuryUsers', JSON.stringify(users));
                localStorage.setItem('mercuryUser', JSON.stringify(currentUser));
                alert('Пароль успешно изменен!');
                e.target.reset();
            }
        });

        document.getElementById('employeesBtn')?.addEventListener('click', openEmployeesModal);
        document.getElementById('changesBtn')?.addEventListener('click', openChangesModal);
    }

    let bernoulliChart = null;
    function initBernoulliChart() {
        const ctx = document.getElementById('bernoulliChart')?.getContext('2d'); if (!ctx) return;
        const n = parseInt(document.getElementById('bernoulliN').value) || 0; const p = parseFloat(document.getElementById('bernoulliP').value) || 0;
        const k_vals = Array.from({length: n + 1}, (_, i) => i); const probs = k_vals.map(k => bernoulliProbability(n, k, p));
        if (bernoulliChart) bernoulliChart.destroy();
        bernoulliChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: k_vals,
                datasets: [{
                    label: `P(X=k)`,
                    data: probs,
                    backgroundColor: 'rgba(197, 160, 89, 0.6)',
                    borderColor: 'rgba(197, 160, 89, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(197, 160, 89, 0.05)' },
                        ticks: { color: '#dcd3c1' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#dcd3c1' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#c5a059' } }
                }
            }
        });
    }

    function renderPage(pageId) {
        const content = document.getElementById('pageContent');
        if (!content) return;

        if (pageId === 'profile') {
            content.innerHTML = renderProfilePage();
            initProfileHandlers();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
        }

        if (pageId === 'tanks' && !currentUser) {
            renderPage('login');
            return;
        }

        if (pageId === 'home') {
            content.innerHTML = renderHome();
            document.getElementById('editPricesBtn')?.addEventListener('click', openEditPricesModal);
            document.getElementById('homeAddNewsBtn')?.addEventListener('click', openAddNewsModal);
        }
        else if (pageId === 'tanks') {
            content.innerHTML = renderTanksPage();
            initBernoulliChart();
            document.getElementById('bernoulliN')?.addEventListener('input', initBernoulliChart);
            document.getElementById('bernoulliP')?.addEventListener('input', initBernoulliChart);
            if (currentUser && (currentUser.role === 'admin' || currentUser.permissions.canEditTanks)) {
                document.getElementById('saveTanksBtn')?.addEventListener('click', saveTanks);
            }
        }
        else if (pageId === 'about') content.innerHTML = renderAboutPage();
        else if (pageId === 'news') {
            content.innerHTML = renderNewsPage();
            document.getElementById('addNewsBtn')?.addEventListener('click', openAddNewsModal);
        }
        else if (pageId === 'prices') content.innerHTML = renderPricesPage();
        else if (pageId === 'marketPrices') {
            content.innerHTML = renderMarketPricesPage();
            document.getElementById('addMarketFuelBtn')?.addEventListener('click', openAddMarketFuelModal);
            document.getElementById('saveMarketPricesBtn')?.addEventListener('click', saveMarketPrices);
        }
        else if (pageId === 'contacts') content.innerHTML = renderContactsPage();
        else if (pageId === 'login') {
            content.innerHTML = renderLoginPage();
            document.getElementById('loginForm')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                if (!login(u, p)) {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            });
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('click', (e) => {
        const navBtn = e.target.closest('[data-nav], .nav-page-btn');
        if (navBtn) {
            e.preventDefault();
            const target = navBtn.getAttribute('data-nav');
            if (target) {
                if (target === 'tanks') selectedTankCity = null;
                renderPage(target);
            }
        }

        const sortBtn = e.target.closest('[data-news-sort]');
        if (sortBtn) {
            newsSortMode = sortBtn.getAttribute('data-news-sort');
            renderPage('news');
        }
    });

    renderHeader();
    renderPage('home');
</script>
